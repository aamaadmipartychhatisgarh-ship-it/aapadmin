name: Release desktop app

# AUTO-RELEASE: every push to master builds a new signed installer, auto-bumps
# the patch version, tags it, and publishes a GitHub Release. Installed apps then
# see the new version via the in-app updater and offer "Update available".
#
# So the workflow is simply: push code to master → every user gets the update.
#
# Skip a release for a given commit by putting "[skip release]" in the message.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   TAURI_SIGNING_PRIVATE_KEY           contents of aap-admin-updater.key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  the key's password
#   DB_HOST DB_USER DB_PASSWORD DB_NAME DB_PORT NEXTAUTH_SECRET
#                                       written into .env.production at build time

on:
  push:
    branches: [master]

# Don't run two releases at once; cancel older in-progress runs.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    if: "!contains(github.event.head_commit.message, '[skip release]') && !startsWith(github.event.head_commit.message, 'chore: release v')"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # Cache Rust build artifacts so repeat builds are ~3-4 min instead of ~10.
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Install dependencies
        run: npm ci

      # Auto-bump the patch version in package.json + tauri.conf.json, commit it
      # back, and compute the new tag. This is what makes "just push" = "release".
      - name: Bump version
        id: bump
        shell: bash
        run: |
          cur=$(node -p "require('./package.json').version")
          IFS='.' read -r MA MI PA <<< "$cur"
          new="$MA.$MI.$((PA+1))"
          echo "Bumping $cur -> $new"
          # package.json
          node -e "const f='package.json';const p=require('./'+f);p.version='$new';require('fs').writeFileSync(f, JSON.stringify(p,null,2)+'\n')"
          # tauri.conf.json
          node -e "const f='src-tauri/tauri.conf.json';const c=require('./'+f);c.version='$new';require('fs').writeFileSync(f, JSON.stringify(c,null,2)+'\n')"
          echo "version=$new" >> "$GITHUB_OUTPUT"
          echo "tag=v$new" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/tauri.conf.json
          git commit -m "chore: release ${{ steps.bump.outputs.tag }}"
          git tag ${{ steps.bump.outputs.tag }}
          git push origin HEAD:master
          git push origin ${{ steps.bump.outputs.tag }}

      # The DB/auth env is not committed (public repo). Recreate it from secrets.
      - name: Write .env.production from secrets
        shell: bash
        run: |
          cat > .env.production <<EOF
          DB_HOST=${{ secrets.DB_HOST }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_PORT=${{ secrets.DB_PORT }}
          NEXTAUTH_URL=http://127.0.0.1:3000
          NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
          HOSTNAME=127.0.0.1
          PORT=3000
          EOF

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.bump.outputs.tag }}
          releaseName: "AAP Admin ${{ steps.bump.outputs.tag }}"
          releaseBody: "Automated desktop release. The app will offer this update in-app."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
